<!DOCTYPE html>
<html>
<body>

<input id="input" type="date">

<script>
const input = document.getElementById("input");

input.addEventListener("input", () => {
    input.type = "text";
});

input.focus();

input.value = "2024-01-01";
input.dispatchEvent(new Event("input", { bubbles: true }));

alert("type =", input.type);
</script>

</body>
</html>
